<html lang="nl">
<head>

    <title>S.V. Overvecht De Dreef | JO14-2</title>

    <style>
        :root {
            --dreef-donker: #0d061a;
            --dreef-rood: #b31a0c;
            --wit: #ffffff;
            --achtergrond: #f0f2f5; /* Lichtgrijs, past bij elke clubsite */
            --tekst: #333333;
        }

        body {

            margin: 0;
            background-color: var(--achtergrond);
            color: var(--tekst);
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--dreef-donker);
            color: var(--wit);
            padding: 20px 0;
            text-align: center;
            border-bottom: 5px solid var(--dreef-rood);
        }

        .logo-img {
            width: 80px; /* Precies goed formaat */
            height: auto;
            margin-bottom: 10px;
        }

        header h1 {
            font-family: 'Oswald', sans-serif;
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header h1 span { color: var(--dreef-rood); }

        /* --- CONTAINER --- */
        .wrapper {
            max-width: 600px; /* Niet te breed, niet te smal */
            margin: 30px auto;
            padding: 0 15px;
        }

        /* --- KAARTEN (Zachte ronde hoeken) --- */
        .card {
            background: var(--wit);
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }

        .card-header {
            background: var(--dreef-donker);
            color: var(--wit);
            padding: 12px;
            text-align: center;
        }

        .card-header h2 {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

            align-items: center;
            padding: 25px 10px;
        }
