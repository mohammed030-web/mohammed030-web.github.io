<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.V. Overvecht De Dreef | JO14-2</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <img src="logo.png" alt="S.V. Overvecht De Dreef Logo" class="club-logo">
            <div class="header-text">
                <h1>S.V. Overvecht <span>De Dreef</span></h1>
                <p>Officiële Team-site JO14-2</p>
            </div>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#programma">Programma</a>
            <a href="#stand">Stand</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Klaar voor de aftrap?</h2>
            <p>Volg hier alle verrichtingen van de JO14-2 van de mooiste club uit Utrecht.</p>
        </section>

        <section class="container" id="programma">
            <div class="card">
                <div class="card-header">
                    <h3>Programma & Uitslagen</h3>
                </div>
                <div class="widget-wrapper">
                    <iframe 
                        src="https://www.voetbal.nl/team/BBJC51T/JO14-2/programma" 
                        class="voetbal-iframe"
                        scrolling="yes">
                    </iframe>
                </div>
                <p class="caption">Live data via Voetbal.nl</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 S.V. Overvecht De Dreef | Utrecht</p>
        <p class="small">Powered by GitHub Pages</p>
    </footer>
